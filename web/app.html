<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visual Timeline</title>
<style>
  :root {
    --bg: #181b1f; --bg2: #22262b; --border: #2c3235;
    --text: #ccccdc; --dim: #7b8087;
    --accent: #f2cc0c; --live: #73bf69;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 12px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .topbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--border); flex: 0 0 auto;
  }
  .brand { font-weight: 700; font-size: 13px; letter-spacing: .3px; }
  .brand .dot { color: var(--accent); }
  .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    padding: 2px 9px; border-radius: 10px; cursor: pointer; user-select: none;
    background: var(--bg2); border: 1px solid var(--border); color: var(--dim);
  }
  .chip.on { color: #111; background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .seg button {
    background: var(--bg2); color: var(--dim); border: 0; padding: 3px 10px;
    cursor: pointer; font: inherit;
  }
  .seg button.on { background: var(--accent); color: #111; font-weight: 600; }
  .spacer { flex: 1; }
  .cursor-time { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--accent); min-width: 62px; }
  .live-badge { display: none; padding: 1px 7px; border-radius: 3px; background: var(--live); color: #111; font-weight: 700; }
  body.is-live .live-badge { display: inline-block; }
  .win { color: var(--dim); font-variant-numeric: tabular-nums; }
  .note { color: var(--dim); font-size: 11px; }
  .panels { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; gap: 8px; padding: 8px 12px; }
  .panel { min-height: 0; display: flex; flex-direction: column; }
  body[data-mode="both"] .panel.timeline { flex: 3 1 0; }
  body[data-mode="both"] .panel.grid-panel { flex: 2 1 0; }
  body[data-mode="timeline"] .panel.grid-panel { display: none; }
  body[data-mode="timeline"] .panel.timeline { flex: 1 1 auto; }
  body[data-mode="grid"] .panel.timeline { display: none; }
  body[data-mode="grid"] .panel.grid-panel { flex: 1 1 auto; }
</style>
</head>
<body data-mode="both">
  <div class="topbar">
    <span class="brand">Visual<span class="dot">·</span>Timeline</span>
    <nav class="chips" id="siteChips" title="site filter"></nav>
    <div class="seg" id="modeSeg">
      <button data-mode="timeline">Timeline</button>
      <button data-mode="both">Both</button>
      <button data-mode="grid">Grid</button>
    </div>
    <div class="seg" id="fitSeg">
      <button data-fit="fit">Fit</button>
      <button data-fit="fill">Fill</button>
    </div>
    <div class="seg" id="ranges"></div>
    <span class="note">drag a strip to zoom</span>
    <span class="spacer"></span>
    <span class="cursor-time" id="cursorTime"></span>
    <span class="live-badge">LIVE</span>
    <span class="win" id="winLabel"></span>
  </div>
  <div class="panels">
    <div class="panel timeline"><div id="timelineMount" style="flex:1;min-height:0"></div></div>
    <div class="panel grid-panel"><div id="gridMount" style="flex:1;min-height:0"></div></div>
  </div>

<script src="vt-core.js"></script>
<script>
'use strict';
/* Visual Timeline — standalone app. All rendering lives in the shared core
 * (vt-core.js, built from src/core.ts — the same code the Grafana panel
 * runs). This file is only chrome and glue: URL state, site chips, mode and
 * fit toggles, quick ranges, and the within-page cursor sync that stands in
 * for Grafana's shared crosshair. */

const qs = new URLSearchParams(location.search);
const NOW = Date.now();

/* ---------------- URL state (accepts Grafana dashboard-link params) ------- */
function parseVar(v) {
  if (!v || v === 'All' || v === '$__all') return null;
  return v.replace(/^\{|\}$/g, '').split(',').map(s => s.trim()).filter(Boolean);
}
function parseVarMulti(direct, linkVals) {
  if (direct) return parseVar(direct);
  if (!linkVals.length) return null;
  const out = [];
  for (const v of linkVals) {
    const p = parseVar(v);
    if (p === null) return null;
    out.push(...p);
  }
  return out.length ? out : null;
}
function parseTimeParam(v, def) {
  if (!v) return def;
  if (/^\d+$/.test(v)) return Number(v);
  const m = /^now(?:-(\d+)([smhdw]))?$/.exec(v);
  if (m) {
    const mult = { s: 1e3, m: 60e3, h: 3600e3, d: 864e5, w: 6048e5 };
    return NOW - (m[1] ? Number(m[1]) * mult[m[2]] : 0);
  }
  return def;
}
const P = {
  site:  parseVarMulti(qs.get('site'), qs.getAll('var-site')),
  from:  parseTimeParam(qs.get('from'), NOW - 3600e3),
  to:    parseTimeParam(qs.get('to'), NOW),
  mode:  ['timeline', 'grid', 'both'].includes(qs.get('mode')) ? qs.get('mode') : 'both',
  fit:   qs.get('fit') === 'fill' ? 'fill' : 'fit',
  key:   qs.get('k') || '',
  tags:  qs.get('tags') || '',
  hideEmpty: qs.get('hideEmpty') === '1',
  annLanes: qs.get('annLanes') === 'per-source' ? 'per-source' : 'shared',
  header: qs.get('header') === 'inline' ? 'inline' : 'bar',
};
const SPAN = Math.max(1, P.to - P.from);
const LIVE = P.to > NOW - 2 * 60 * 1000;

function navigate(updates) {
  const u = new URL(location.href);
  for (const [k, v] of Object.entries(updates)) {
    if (v === null || v === undefined || v === '') u.searchParams.delete(k);
    else u.searchParams.set(k, v);
  }
  u.searchParams.delete('var-site');
  location.href = u;
}

const fmtTime = ts => new Date(ts).toLocaleTimeString('en-AU', { hour12: false });
const fmtShort = ts => new Date(ts).toLocaleTimeString('en-AU', { hour12: false, hour: '2-digit', minute: '2-digit' });

const AUTHH = P.key ? { headers: { authorization: 'Bearer ' + P.key } } : undefined;
async function probeApi() {
  if (qs.get('backend') === 'mock') return false;
  try {
    const r = await fetch(new URL('/sources', location.origin), AUTHH);
    return r.ok;
  } catch { return false; }
}

const QUICK_RANGES = [['5m', 5 * 60e3], ['15m', 15 * 60e3], ['1h', 3600e3], ['3h', 3 * 3600e3],
                      ['6h', 6 * 3600e3], ['12h', 12 * 3600e3], ['24h', 24 * 3600e3]];

(async function boot() {
  const useApi = await probeApi();
  const apiUrl = useApi ? location.origin : '';
  document.body.dataset.mode = P.mode;
  document.body.classList.toggle('is-live', LIVE);
  document.getElementById('winLabel').textContent =
    fmtShort(P.from) + ' → ' + fmtShort(P.to) + (useApi ? '' : ' · demo data');
  document.getElementById('cursorTime').textContent = fmtTime(Math.min(P.to, NOW));

  const common = {
    site: P.site ? P.site.join(',') : '',
    from: P.from, to: P.to,
    fit: P.fit, apiUrl, apiKey: P.key,
    tagFilter: P.tags, hideEmpty: P.hideEmpty,
    annotationLanes: P.annLanes,
    headerMode: P.header,
  };

  // site chips: distinct sites from the registry (or the demo set)
  try {
    const sites = useApi
      ? [...new Set((await (await fetch(new URL('/sources', location.origin), AUTHH)).json()).map(k => k.site))].sort()
      : ['site-a', 'site-b'];
    document.getElementById('siteChips').innerHTML =
      sites.map(s => `<span class="chip ${!P.site || P.site.includes(s) ? 'on' : ''}" data-site="${s}">${s}</span>`).join('');
    document.getElementById('siteChips').addEventListener('click', e => {
      const s = e.target.dataset.site;
      if (!s) return;
      let sel = P.site ? [...P.site] : [...sites];
      sel = sel.includes(s) ? sel.filter(x => x !== s) : [...sel, s];
      if (!sel.length) sel = [s];
      navigate({ site: sel.length === sites.length ? null : sel.join(',') });
    });
  } catch { /* chips are best-effort */ }

  for (const btn of document.querySelectorAll('#modeSeg button')) {
    btn.classList.toggle('on', btn.dataset.mode === P.mode);
    btn.onclick = () => navigate({ mode: btn.dataset.mode === 'both' ? null : btn.dataset.mode });
  }
  for (const btn of document.querySelectorAll('#fitSeg button')) {
    btn.classList.toggle('on', btn.dataset.fit === P.fit);
    btn.onclick = () => navigate({ fit: btn.dataset.fit === 'fit' ? null : btn.dataset.fit });
  }
  document.getElementById('ranges').innerHTML = QUICK_RANGES.map(([label, ms]) =>
    `<button data-ms="${ms}" class="${Math.abs(SPAN - ms) < 1000 ? 'on' : ''}">${label}</button>`).join('');
  document.getElementById('ranges').addEventListener('click', e => {
    const ms = Number(e.target.dataset.ms);
    if (ms) navigate({ from: Date.now() - ms, to: Date.now() });
  });

  // mounts + within-page cursor sync (timeline hover drives the grid)
  let grid = null, timeline = null;
  const mountAll = () => {
    if (grid) grid.destroy();
    if (timeline) timeline.destroy();
    grid = P.mode !== 'timeline'
      ? VTCore.mountGrid(document.getElementById('gridMount'), { ...common })
      : null;
    timeline = P.mode !== 'grid'
      ? VTCore.mountTimeline(document.getElementById('timelineMount'), {
          ...common,
          onZoom: (from, to) => navigate({ from, to }),
          onCursor: t => { document.getElementById('cursorTime').textContent = fmtTime(t); },
          onHover: t => { if (grid) grid.setExternalCursor(t); },
          onHoverClear: () => { if (grid) grid.clearExternal(); },
        })
      : null;
  };
  mountAll();

  let rt = null;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(mountAll, 300);
  });
})();
</script>
</body>
</html>
