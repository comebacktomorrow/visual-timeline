<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visual Timeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #181b1f; overflow: hidden; }
  #mount { width: 100%; height: 100%; padding: 6px 8px; }
</style>
</head>
<body>
  <div id="mount"></div>

<script src="vt-core.js"></script>
<script>
'use strict';
/* Minimal embeddable viewer — a single timeline from the shared core, driven
 * entirely by URL params. Built for iframe embedding (Grafana Text panel:
 * ?site=${site:csv}&from=${__from}&to=${__to}&k=<viewer key>) and Grafana
 * dashboard link-out (keepTime + includeVars append var-site / now-relative
 * times). The full-chrome standalone experience lives at app.html. */

const qs = new URLSearchParams(location.search);
const NOW = Date.now();

function parseVar(v) {
  if (!v || v === 'All' || v === '$__all') return null;
  return v.replace(/^\{|\}$/g, '').split(',').map(s => s.trim()).filter(Boolean);
}
function parseVarMulti(direct, linkVals) {
  if (direct) return parseVar(direct);
  if (!linkVals.length) return null;
  const out = [];
  for (const v of linkVals) {
    const p = parseVar(v);
    if (p === null) return null;
    out.push(...p);
  }
  return out.length ? out : null;
}
function parseTimeParam(v, def) {
  if (!v) return def;
  if (/^\d+$/.test(v)) return Number(v);
  const m = /^now(?:-(\d+)([smhdw]))?$/.exec(v);
  if (m) {
    const mult = { s: 1e3, m: 60e3, h: 3600e3, d: 864e5, w: 6048e5 };
    return NOW - (m[1] ? Number(m[1]) * mult[m[2]] : 0);
  }
  return def;
}

const site = parseVarMulti(qs.get('site'), qs.getAll('var-site'));
const kiosk = parseVarMulti(qs.get('kiosk') || qs.get('source'), qs.getAll('var-kiosk'));
const key = qs.get('k') || '';

(async function boot() {
  let apiUrl = '';
  if (qs.get('backend') !== 'mock') {
    try {
      const r = await fetch(new URL('/sources', location.origin),
        key ? { headers: { authorization: 'Bearer ' + key } } : undefined);
      if (r.ok) apiUrl = location.origin;
    } catch { /* demo data */ }
  }
  VTCore.mountTimeline(document.getElementById('mount'), {
    site: site ? site.join(',') : '',
    source: kiosk ? kiosk.join(',') : '',
    from: parseTimeParam(qs.get('from'), NOW - 3600e3),
    to: parseTimeParam(qs.get('to'), NOW),
    fit: qs.get('fit') === 'fill' ? 'fill' : 'fit',
    apiUrl,
    apiKey: key,
    tagFilter: qs.get('tags') || '',
    hideEmpty: qs.get('hideEmpty') === '1',
  });
})();
</script>
</body>
</html>
